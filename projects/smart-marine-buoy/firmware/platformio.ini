; PlatformIO project configuration - Smart Marine Buoy (v1, ESP32 dev board)
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Libraries pinned as the implementation lands, e.g.:
; lib_deps =
;   adafruit/Adafruit MPU6050
;   sandeepmistry/LoRa            ; RFM95 driver
; The FFT / feature pipeline is hand-built first (ADR-0003) and cross-checked;
; any FFT library is added afterwards for on-device speed only.
